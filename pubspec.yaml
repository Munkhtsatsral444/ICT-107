name: meeting_mode
description: A cross-platform meeting mode and world clock application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.2.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^22.1.0
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  sound_mode: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true